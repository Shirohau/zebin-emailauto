services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_DEBUG: "0"
    volumes:
      - django_data:/data
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  django_data:
